<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL CLUB DE LA FRAGANCIA</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}
body{
font-family:'Poppins',sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

/* ===== TU CSS ORIGINAL SIN CAMBIOS ===== */

header{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,.92);
backdrop-filter:blur(12px);
padding:18px 45px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.08);
}

.decant-grid{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:50px;
}

.decant-card{
background:#111;
padding:20px;
border-radius:20px;
width:280px;
border:1px solid #222;
text-align:center;
}

.decant-card img{
width:100%;
height:280px;
object-fit:cover;
border-radius:15px;
display:block;
}

.decant-card h3{margin-top:20px;font-size:28px;}

.logo{
font-size:24px;
font-weight:600;
letter-spacing:3px;
color:white;
}

nav{display:flex;gap:25px;}

nav a{
text-decoration:none;
color:white;
font-size:14px;
letter-spacing:1px;
font-weight:500;
transition:.3s;
position:relative;
}

nav a:hover{color:#d4af37;}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background: linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.85)), url('images/banner.jpg');
background-size:cover;
background-position:center;
}

.section{padding:100px 20px;}

.section-title{
text-align:center;
font-size:45px;
margin-bottom:25px;
color:#d4af37;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:35px;
max-width:1400px;
margin:auto;
margin-top:60px;
}

.product-card{
background:#101014;
border-radius:25px;
overflow:hidden;
border:1px solid #222;
}

.product-image{
background:white;
padding:25px;
height:360px;
display:flex;
justify-content:center;
align-items:center;
}

.product-image img{
max-width:100%;
max-height:300px;
object-fit:contain;
}

.product-info{padding:25px;}

.size-btn{
padding:10px;
border:none;
background:#1d1d24;
color:white;
cursor:pointer;
}

.price{
font-size:30px;
color:#d4af37;
margin:10px 0;
}

.buy-btn{
width:100%;
padding:16px;
background:#d4af37;
border:none;
font-weight:700;
cursor:pointer;
}

.cart-button{
position:fixed;
bottom:25px;
right:25px;
width:68px;
height:68px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
}

.cart-count{
position:absolute;
background:red;
color:white;
border-radius:50%;
width:22px;
height:22px;
font-size:12px;
top:-2px;
right:-2px;
}
</style>
</head>

<body>

<header>
<div class="logo">EL CLUB DE LA FRAGANCIA</div>
<nav>
<a href="#inicio">Inicio</a>
<a href="#catalogo">Catálogo</a>
<a href="#clientes">Clientes</a>
<a href="#contacto">Contáctanos</a>
</nav>
</header>

<section class="hero" id="inicio">
<div>
<img src="images/logo.png" class="hero-logo">
<p>Fragancias originales en 3ml, 5ml, 10ml o botella completa.</p>
<button onclick="document.getElementById('catalogo').scrollIntoView()">Explorar Catálogo</button>
</div>
</section>

<section class="section" id="catalogo">
<h2 class="section-title">Catálogo Premium</h2>
<div class="products-grid" id="productsContainer"></div>
</section>

<div class="cart-button" onclick="openCheckout()">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>

<div class="modal" id="checkoutModal">
<div class="modal-content">
<button onclick="closeCheckout()">✕</button>
<h2>Tu Carrito</h2>
<div id="cartItems"></div>

<input id="nombre" placeholder="Nombres y Apellidos">

<select id="fecha"></select>

<select id="modalidad" onchange="toggleDelivery()">
<option value="">Modalidad</option>
<option value="entrega">Entrega</option>
<option value="retiro">Retiro</option>
</select>

<div id="deliveryFields" class="hidden">

<select id="ciudad" onchange="toggleCiudadYEnvio()">
<option value="">Ciudad</option>
<option value="quito">Quito</option>
<option value="fuera">Fuera</option>
</select>

<select id="zonto" class="hidden" onchange="calcularEnvio()">
<option value="">Zona</option>
<option value="perimetro">Perímetro $3.25</option>
<option value="fuera_perimetro">Fuera $4.50</option>
</select>

</div>

<button onclick="sendWhatsApp()">Enviar Pedido</button>

</div>
</div>

<script>
window.onload = function(){
const fechaSelect = document.getElementById('fecha');
for(let i=0;i<15;i++){
const f=new Date();
f.setDate(f.getDate()+i);
const opt=document.createElement('option');
opt.value=f.toLocaleDateString();
opt.text=f.toLocaleDateString();
fechaSelect.appendChild(opt);
}
};

let cart=[];
let selectedSize={};
let selectedPrice={};
let selectedImage={};
let shippingCost=null;

/* ===== FIX PRINCIPAL CATALOGO ===== */
const sheetURL='https://docs.google.com/spreadsheets/d/e/2PACX-1vR-f7qVxZ-oOGhGkSTs7l4hIaepmdzieynclQWVjK7FA-vTE37mLnIK8pZoaGZvCYkH7J6T1X_yxv-T/pub?output=csv';

fetch(sheetURL)
.then(r=>r.text())
.then(data=>{
const rows=data.trim().split('\n').slice(1);

rows.forEach(row=>{
const cols=row.split(',');
const nombre=cols[0]?.trim();
const precio3=cols[1]?.trim();
const precio5=cols[2]?.trim();
const precio10=cols[3]?.trim();
const precio100=cols[4]?.trim();
if(!nombre)return;

const id=nombre.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9]/gi,'');

selectedSize[id]='3ml';
selectedPrice[id]=precio3;
selectedImage[id]=`images/${id}3ml.jpg`;

document.getElementById('productsContainer').innerHTML += `
<div class="product-card">
<div class="product-image">
<img id="${id}Image" src="images/${id}3ml.jpg">
</div>

<div class="product-info">
<h3>${nombre}</h3>

<div class="size-options">
<button onclick="changeImage('${id}','3ml','${precio3}')">3ml</button>
<button onclick="changeImage('${id}','5ml','${precio5}')">5ml</button>
<button onclick="changeImage('${id}','10ml','${precio10}')">10ml</button>
<button onclick="changeImage('${id}','100ml','${precio100}')">Botella</button>
</div>

<div class="price" id="${id}Price">$${precio3}</div>

<button onclick="addToCart('${nombre}',selectedSize['${id}'],selectedPrice['${id}'],selectedImage['${id}'])">
Agregar al carrito
</button>

</div>
</div>
`;
});
});

function changeImage(product,size,price){
document.getElementById(product+'Image').src=`images/${product}${size}.jpg`;
document.getElementById(product+'Price').innerText='$'+price;

selectedSize[product]=size;
selectedPrice[product]=price;
selectedImage[product]=`images/${product}${size}.jpg`;
}

function addToCart(nombre,size,price,image){
cart.push({nombre,size,price,image});
document.getElementById('cartCount').innerText=cart.length;
updateCartUI();
}

function updateCartUI(){
const cartItems=document.getElementById('cartItems');
if(cart.length===0){
cartItems.innerHTML="Vacío";
return;
}

let html='';
let total=0;

cart.forEach(item=>{
let p=parseFloat(item.price);
if(isNaN(p))p=0;
total+=p;

html+=`
<div>
${item.nombre} (${item.size}) - $${p.toFixed(2)}
</div>
`;
});

cartItems.innerHTML=html;
}

function openCheckout(){
document.getElementById('checkoutModal').style.display='flex';
updateCartUI();
}

function closeCheckout(){
document.getElementById('checkoutModal').style.display='none';
}
</script>

</body>
</html>
