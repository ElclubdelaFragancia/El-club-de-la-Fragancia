<script>

function changeSize(id,size){

const img = document.getElementById(id);

if(size === '3'){
img.src = 'images/33_edited.jpg';
}

if(size === '5'){
img.src = 'images/34_edited.jpg';
}

if(size === '10'){
img.src = 'images/35_edited.jpg';
}

}

function buyProduct(product){

const message = `Hola, quiero comprar el perfume ${product} en decant.`;

const url = `https://wa.me/593999999999?text=${encodeURIComponent(message)}`;

window.open(url,'_blank');
}

</script>
